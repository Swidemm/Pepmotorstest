<div class="container">
  <div class="catalog-layout">

    <!-- SIDEBAR FILTERS -->
    <aside class="catalog-sidebar">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">

      <div class="filter-group">
        <p class="filter-group-title">Condición</p>
        <label class="filter-option"><input type="radio" name="condicion" value="" checked onchange="applyFilters()"> Todos</label>
        <label class="filter-option"><input type="radio" name="condicion" value="0km" onchange="applyFilters()"> Solo 0KM</label>
        <label class="filter-option"><input type="radio" name="condicion" value="usado" onchange="applyFilters()"> Solo Usado</label>

      <div class="filter-group">
        <p class="filter-group-title">Marca</p>
        <select class="form-control" id="f-marca" onchange="applyFilters(); buildModeloSelect()">
          <option value="">Todas las marcas</option>
        </select>
      </div>

      <div class="filter-group">
        <p class="filter-group-title">Modelo</p>
        <select class="form-control" id="f-modelo" onchange="applyFilters()">
          <option value="">Todos los modelos</option>
        </select>
      </div>

      <div class="filter-group">
        <p class="filter-group-title">Año</p>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="number" class="form-control" id="f-anio-desde" placeholder="2015" onchange="applyFilters()" style="padding:8px">
          <span style="color:var(--color-gray)">–</span>
          <input type="number" class="form-control" id="f-anio-hasta" placeholder="2025" onchange="applyFilters()" style="padding:8px">
        </div>
      </div>

      <div class="filter-group">
        <p class="filter-group-title">Precio máximo</p>
        <div style="padding:4px 0">
          <input type="range" id="f-precio" min="0" max="60000000" step="1000000" value="60000000" oninput="updatePriceLabel(); applyFilters()">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--color-gray);margin-top:4px">
            <span>$0</span>
            <span id="price-label" style="color:var(--color-white);font-weight:600">Sin límite</span>
          </div>

      </div>

      <div class="filter-group">
        <p class="filter-group-title">Combustible</p>

        <label class="filter-option"><input type="checkbox" value="diesel" class="f-combustible" onchange="applyFilters()"> Diesel</label>
        <label class="filter-option"><input type="checkbox" value="hibrido" class="f-combustible" onchange="applyFilters()"> Híbrido</label>
        <label class="filter-option"><input type="checkbox" value="electrico" class="f-combustible" onchange="applyFilters()"> Eléctrico</label>
        <label class="filter-option"><input type="checkbox" value="gnc" class="f-combustible" onchange="applyFilters()"> GNC</label>
      </div>

      <div class="filter-group">
        <p class="filter-group-title">Transmisión</p>
        <label class="filter-option"><input type="checkbox" value="manual" class="f-transmision" onchange="applyFilters()"> Manual</label>
        <label class="filter-option"><input type="checkbox" value="automatica" class="f-transmision" onchange="applyFilters()"> Automática</label>

<script src="assets/js/storage.js"></script>
<script src="assets/js/main.js"></script>
<script>
  const PER_PAGE = 12;
  let allVehicles = [], filtered = [];
  let currentPage = 1;
  let currentView = 'grid';

  async function init() {
    const [config, vehiculos] = await Promise.all([Storage.get('config'), Storage.get('vehiculos')]);
    allVehicles = vehiculos.filter(v => v.estado === 'disponible' || v.estado === 'reservado');

    const e = config.empresa || {};
    const ap = config.apariencia || {};
    if (ap.color_primario) document.documentElement.style.setProperty('--color-primary', ap.color_primario);
    const wa = e.whatsapp || '';
    if (wa) { document.getElementById('whatsapp-nav').href = `https://wa.me/${wa}`; document.getElementById('whatsapp-float').href = `https://wa.me/${wa}`; }

    // Build marca select
    const marcas = [...new Set(allVehicles.map(v => v.marca))].sort();
    const marcaSelect = document.getElementById('f-marca');
    marcas.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; marcaSelect.appendChild(o); });

    // Read URL params
    const params = new URLSearchParams(window.location.search);
    if (params.get('marca')) marcaSelect.value = params.get('marca');
    if (params.get('condicion')) {
      document.querySelectorAll('[name="condicion"]').forEach(r => { if (r.value === params.get('condicion')) r.checked = true; });
    }
    if (params.get('precio_max')) {
      document.getElementById('f-precio').value = params.get('precio_max');
      updatePriceLabel();
    }
    if (params.get('condicion')) buildModeloSelect();

    document.getElementById('total-count').textContent = allVehicles.length;
    applyFilters();
  }

  function buildModeloSelect() {
    const marca = document.getElementById('f-marca').value;
    const modelos = [...new Set(allVehicles.filter(v => !marca || v.marca === marca).map(v => v.modelo))].sort();
    const sel = document.getElementById('f-modelo');
    sel.innerHTML = '<option value="">Todos los modelos</option>';
    modelos.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; sel.appendChild(o); });
  }

  function updatePriceLabel() {
    const val = parseInt(document.getElementById('f-precio').value);
    const max = parseInt(document.getElementById('f-precio').max);
    document.getElementById('price-label').textContent = val >= max ? 'Sin límite' : formatPrice(val);
  }

  function applyFilters() {
    const condicion = document.querySelector('[name="condicion"]:checked')?.value || '';
    const marca = document.getElementById('f-marca').value;
    const modelo = document.getElementById('f-modelo').value;
    const anioDesde = parseInt(document.getElementById('f-anio-desde').value) || 0;
    const anioHasta = parseInt(document.getElementById('f-anio-hasta').value) || 9999;
    const precioMax = parseInt(document.getElementById('f-precio').value);
    const maxLimit = parseInt(document.getElementById('f-precio').max);
    const combustibles = [...document.querySelectorAll('.f-combustible:checked')].map(c => c.value);
    const transmisiones = [...document.querySelectorAll('.f-transmision:checked')].map(c => c.value);
    const sort = document.getElementById('sort-select').value;

    filtered = allVehicles.filter(v =>
      (!condicion || v.condicion === condicion) &&
      (!marca || v.marca === marca) &&
      (!modelo || v.modelo === modelo) &&
      v.anio >= anioDesde && v.anio <= anioHasta &&
      (precioMax >= maxLimit || v.precio <= precioMax) &&
      (!combustibles.length || combustibles.includes(v.combustible)) &&
      (!transmisiones.length || transmisiones.includes(v.transmision))
    );

    if (sort === 'precio-asc') filtered.sort((a,b) => a.precio - b.precio);
    else if (sort === 'precio-desc') filtered.sort((a,b) => b.precio - a.precio);
    else if (sort === 'anio-desc') filtered.sort((a,b) => b.anio - a.anio);
    else if (sort === 'km-asc') filtered.sort((a,b) => a.km - b.km);
    else filtered.sort((a,b) => new Date(b.fecha_ingreso||0) - new Date(a.fecha_ingreso||0));

    currentPage = 1;
    renderPage();
  }

  function renderPage() {
    const start = (currentPage - 1) * PER_PAGE;
    const page = filtered.slice(start, start + PER_PAGE);
    document.getElementById('result-count').textContent = filtered.length;

    const container = document.getElementById('vehicles-container');
    if (!filtered.length) {
      container.innerHTML = `<div style="text-align:center;padding:80px 0;color:var(--color-gray)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="64" height="64" style="margin:0 auto 16px;opacity:0.3"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        <p style="font-size:16px">No hay vehículos que coincidan con los filtros</p>
        <button onclick="clearFilters()" class="btn btn-outline" style="margin-top:16px">Limpiar filtros</button>
      </div>`;
    } else if (currentView === 'grid') {
      container.className = 'vehicles-grid';
      container.innerHTML = page.map(v => buildVehicleCard(v)).join('');
    } else {
      container.className = 'vehicles-list';
      container.innerHTML = page.map(v => buildVehicleListCard(v)).join('');
    }

    renderPagination();
  }

  function buildVehicleListCard(v) {
    const badgeCls = v.condicion === '0km' ? 'vc-badge-0km' : 'vc-badge-used';
    const isFav = Favorites.has(v.id);
    const imgHtml = v.fotos && v.fotos.length
      ? `<img src="${v.fotos[0]}" alt="${v.marca} ${v.modelo}" loading="lazy">`
      : `<div class="vc-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="40" height="40"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>`;
    return `
      <article class="vehicle-card-list" onclick="window.location.href='vehiculo.html?id=${v.id}'">
        <div class="vc-img">
          ${imgHtml}
          <span class="vc-badge ${badgeCls}">${v.condicion === '0km' ? '0KM' : 'USADO'}</span>
        </div>
        <div class="vc-body">
          <div class="vc-brand">${v.marca}</div>
          <div class="vc-name" style="font-size:17px">${v.modelo} <span style="font-weight:500;color:var(--fg-tertiary);font-size:13px">${v.version}</span></div>
          <div class="vc-specs" style="margin-top:8px">
            <span class="vc-spec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${v.anio}</span>
            <span class="vc-spec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>${v.combustible}</span>
            <span class="vc-spec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>${formatKm(v.km)}</span>
          </div>
          <div class="vc-footer">
            <div class="vc-price">${formatPrice(v.precio)}</div>
            <div style="display:flex;gap:8px">
              <button class="vc-heart ${isFav ? 'active' : ''}" data-id="${v.id}" onclick="event.stopPropagation(); toggleFav(this, '${v.id}')" aria-label="Favorito">
                <svg viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
              </button>
              <a href="vehiculo.html?id=${v.id}" class="btn btn-primary btn-sm" onclick="event.stopPropagation()">Ver más</a>
            </div>
          </div>
        </div>
      </article>`;
  }

  function renderPagination() {
    const totalPages = Math.ceil(filtered.length / PER_PAGE);
    if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = '';
    if (currentPage > 1) html += `<button class="page-btn" onclick="goPage(${currentPage-1})">‹</button>`;
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
      } else if (Math.abs(i - currentPage) === 2) {
        html += `<span class="page-btn" style="cursor:default;color:var(--color-gray)">…</span>`;
      }
    }
    if (currentPage < totalPages) html += `<button class="page-btn" onclick="goPage(${currentPage+1})">›</button>`;
    document.getElementById('pagination').innerHTML = html;
  }

  function goPage(n) {
    currentPage = n;
    renderPage();
    window.scrollTo({ top: 100, behavior: 'smooth' });
  }

  function setView(v) {
    currentView = v;
    document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
    document.getElementById('btn-list').classList.toggle('active', v === 'list');
    renderPage();
  }

  function clearFilters() {
    document.querySelectorAll('[name="condicion"]')[0].checked = true;
    document.getElementById('f-marca').value = '';
    document.getElementById('f-modelo').value = '';
    document.getElementById('f-anio-desde').value = '';
    document.getElementById('f-anio-hasta').value = '';
    document.getElementById('f-precio').value = document.getElementById('f-precio').max;
    document.getElementById('price-label').textContent = 'Sin límite';
    document.querySelectorAll('.f-combustible, .f-transmision').forEach(c => c.checked = false);
    document.getElementById('sort-select').value = 'default';
    buildModeloSelect();
    applyFilters();
  }

  init();
</script>
</body>

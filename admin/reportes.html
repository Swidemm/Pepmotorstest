<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes — PEP Motors Admin</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="admin-layout" id="admin-layout">
  <div id="sidebar-container"></div>
  <main class="admin-main">
    <div id="topbar-container"></div>
    <div class="admin-content">

      <div class="page-header-admin flex justify-between items-center mb-6">
        <div>
          <h1 class="page-title">Reportes</h1>
          <p class="page-subtitle">Métricas y estadísticas del negocio</p>
        </div>
        <div class="page-actions">
          <select class="form-control" id="period" style="max-width:200px" onchange="loadReportes()">
            <option value="month">Este mes</option>
            <option value="quarter">Último trimestre</option>
            <option value="year">Este año</option>
            <option value="all">Histórico completo</option>
          </select>
        </div>
      </div>

      <!-- KPIs -->
      <div class="stats-grid-admin" style="margin-bottom:20px">
        <div class="stat-card">
          <div class="stat-card-header"><span class="stat-card-label">Leads generados</span><div class="stat-card-icon blue"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div></div>
          <p class="stat-card-value" id="kpi-leads">—</p>
        </div>
        <div class="stat-card">
          <div class="stat-card-header"><span class="stat-card-label">Ventas cerradas</span><div class="stat-card-icon green"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div></div>
          <p class="stat-card-value" id="kpi-ventas">—</p>
        </div>
        <div class="stat-card">
          <div class="stat-card-header"><span class="stat-card-label">Conversión</span><div class="stat-card-icon yellow"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg></div></div>
          <p class="stat-card-value" id="kpi-conv">—</p>
        </div>
        <div class="stat-card">
          <div class="stat-card-header"><span class="stat-card-label">Ingresos totales</span><div class="stat-card-icon red"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div></div>
          <p class="stat-card-value" id="kpi-ingresos" style="font-size:22px">—</p>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div class="chart-card">
          <div class="chart-card-header"><h3 class="chart-card-title">Ventas por mes</h3></div>
          <div class="chart-wrapper" style="height:240px"><canvas id="chart-ventas-mes"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-card-header"><h3 class="chart-card-title">Leads por fuente</h3></div>
          <div class="chart-wrapper" style="height:240px"><canvas id="chart-fuentes"></canvas></div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div class="chart-card">
          <div class="chart-card-header"><h3 class="chart-card-title">Stock por marca</h3></div>
          <div class="chart-wrapper" style="height:240px"><canvas id="chart-stock"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-card-header"><h3 class="chart-card-title">Funnel de conversión</h3></div>
          <div id="funnel-container" style="padding:8px"></div>
        </div>
      </div>

      <!-- Ranking vendedores -->
      <div class="table-container">
        <div class="table-header"><h3 style="font-size:15px;font-weight:700">Ranking de vendedores</h3></div>
        <table>
          <thead>
            <tr><th>#</th><th>Vendedor</th><th>Ventas</th><th>Ingresos</th><th>Leads asignados</th></tr>
          </thead>
          <tbody id="ranking-tbody"></tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<div class="toast-container"></div>

<script src="../assets/js/storage.js"></script>
<script src="../assets/js/admin/auth.js"></script>
<script src="../assets/js/admin/sidebar.js"></script>
<script>
  Auth.require(['admin', 'gerente']);
  const session = Auth.getSession();
  document.getElementById('sidebar-container').innerHTML = renderSidebar('reportes');
  document.getElementById('topbar-container').innerHTML = renderTopbar('Reportes', '');
  initSidebar();

  let charts = {};

  function destroyCharts() {
    Object.values(charts).forEach(c => { if (c) c.destroy(); });
    charts = {};
  }

  function getDateRange() {
    const period = document.getElementById('period').value;
    const now = new Date();
    if (period === 'month') return new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
    if (period === 'quarter') return new Date(now.getFullYear(), now.getMonth() - 2, 1).toISOString().slice(0,10);
    if (period === 'year') return new Date(now.getFullYear(), 0, 1).toISOString().slice(0,10);
    return '2000-01-01';
  }

  async function loadReportes() {
    const [leads, ventas, vehiculos, usuarios] = await Promise.all([
      Storage.get('leads'), Storage.get('ventas'), Storage.get('vehiculos'), Storage.get('usuarios')
    ]);

    const from = getDateRange();
    const filteredVentas = ventas.filter(v => v.fecha_venta >= from);
    const filteredLeads = leads.filter(l => l.fecha_creacion && l.fecha_creacion.slice(0,10) >= from);

    const conversion = filteredLeads.length > 0 ? Math.round(filteredVentas.length / filteredLeads.length * 100) : 0;
    const ingresos = filteredVentas.reduce((s, v) => s + (v.precio_final || 0), 0);

    document.getElementById('kpi-leads').textContent = filteredLeads.length;
    document.getElementById('kpi-ventas').textContent = filteredVentas.length;
    document.getElementById('kpi-conv').textContent = conversion + '%';
    document.getElementById('kpi-ingresos').textContent = formatPrice(ingresos);

    destroyCharts();
    buildVentasMes(filteredVentas);
    buildFuentes(filteredLeads);
    buildStock(vehiculos);
    buildFunnel(leads);
    buildRanking(filteredVentas, filteredLeads, usuarios);
  }

  const CHART_DEFAULTS = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#B0B0B0', font: { size: 12 } } } },
    scales: {
      y: { beginAtZero: true, ticks: { color: '#6B6B6B' }, grid: { color: 'rgba(255,255,255,0.05)' } },
      x: { ticks: { color: '#6B6B6B' }, grid: { display: false } }
    }
  };

  function buildVentasMes(ventas) {
    const byMonth = {};
    ventas.forEach(v => {
      if (!v.fecha_venta) return;
      const m = v.fecha_venta.slice(0, 7);
      byMonth[m] = (byMonth[m] || 0) + 1;
    });
    const labels = Object.keys(byMonth).sort();
    charts.ventas = new Chart(document.getElementById('chart-ventas-mes'), {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Ventas', data: labels.map(l => byMonth[l]), backgroundColor: 'rgba(201,160,96,0.7)', borderColor: '#C9A060', borderWidth: 1, borderRadius: 6 }] },
      options: { ...CHART_DEFAULTS, plugins: { legend: { display: false } } }
    });
  }

  function buildFuentes(leads) {
    const byFuente = {};
    leads.forEach(l => { byFuente[l.fuente] = (byFuente[l.fuente] || 0) + 1; });
    const labels = Object.keys(byFuente);
    const colors = ['#C9A060','#3B82F6','#F59E0B','#22C55E','#8B5CF6','#EC4899'];
    charts.fuentes = new Chart(document.getElementById('chart-fuentes'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data: labels.map(l => byFuente[l]), backgroundColor: colors, borderColor: 'var(--color-dark-2)', borderWidth: 2 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#B0B0B0' } } } }
    });
  }

  function buildStock(vehiculos) {
    const byMarca = {};
    vehiculos.filter(v => v.estado === 'disponible').forEach(v => { byMarca[v.marca] = (byMarca[v.marca] || 0) + 1; });
    const labels = Object.keys(byMarca).sort((a,b) => byMarca[b] - byMarca[a]);
    charts.stock = new Chart(document.getElementById('chart-stock'), {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Disponibles', data: labels.map(l => byMarca[l]), backgroundColor: 'rgba(59,130,246,0.7)', borderColor: '#3B82F6', borderWidth: 1, borderRadius: 6 }] },
      options: { ...CHART_DEFAULTS, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, ticks: { color: '#6B6B6B' }, grid: { color: 'rgba(255,255,255,0.05)' } }, y: { ticks: { color: '#6B6B6B' }, grid: { display: false } } } }
    });
  }

  function buildFunnel(leads) {
    const stages = ['nuevo','contactado','negociacion','cerrado'];
    const labels = ['Total leads','Contactados','En negociación','Cerrados'];
    const counts = stages.map(s => leads.filter(l => {
      const idx = stages.indexOf(l.estado);
      return idx >= stages.indexOf(s) || l.estado === s;
    }).length);
    // Simple funnel bars
    const total = counts[0] || 1;
    const colors = ['#3B82F6','#F59E0B','#ff8c69','#22C55E'];
    document.getElementById('funnel-container').innerHTML = stages.map((s, i) => `
      <div style="margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;color:var(--color-light-gray)">${labels[i]}</span>
          <span style="font-size:13px;font-weight:700;color:${colors[i]}">${counts[i]}</span>
        </div>
        <div style="height:8px;background:var(--color-dark-3);border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${Math.round(counts[i]/total*100)}%;background:${colors[i]};border-radius:4px;transition:width 0.5s ease"></div>
        </div>
      </div>`).join('');
  }

  function buildRanking(ventas, leads, usuarios) {
    const vendedores = usuarios.filter(u => u.rol !== 'admin');
    const ranking = vendedores.map(u => ({
      nombre: u.nombre,
      ventas: ventas.filter(v => v.vendedor_id === u.id).length,
      ingresos: ventas.filter(v => v.vendedor_id === u.id).reduce((s,v) => s + (v.precio_final||0), 0),
      leads: leads.filter(l => l.vendedor_id === u.id).length,
    })).sort((a,b) => b.ventas - a.ventas);

    document.getElementById('ranking-tbody').innerHTML = ranking.map((r, i) => `
      <tr>
        <td><span style="font-family:var(--font-display);font-size:20px;font-weight:800;color:${i===0?'var(--color-warning)':i===1?'var(--color-light-gray)':i===2?'#cd7f32':'var(--color-gray)'}">${i+1}</span></td>
        <td style="font-weight:600;color:var(--color-white)">${r.nombre}</td>
        <td><span style="background:rgba(34,197,94,0.15);color:var(--color-success);padding:2px 10px;border-radius:100px;font-size:12px;font-weight:700">${r.ventas}</span></td>
        <td style="color:var(--color-success);font-weight:600">${formatPrice(r.ingresos)}</td>
        <td style="color:var(--color-light-gray)">${r.leads}</td>
      </tr>`).join('') || '<tr><td colspan="5" class="text-muted" style="padding:20px;text-align:center">Sin datos</td></tr>';
  }

  loadReportes();
</script>
</body>
</html>

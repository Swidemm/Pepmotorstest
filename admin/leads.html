<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leads — PEP Motors Admin</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="admin-layout" id="admin-layout">
  <div id="sidebar-container"></div>
  <main class="admin-main">
    <div id="topbar-container"></div>
    <div class="admin-content">

      <div class="page-header-admin flex justify-between items-center mb-6">
        <div>
          <h1 class="page-title">Leads / CRM</h1>
          <p class="page-subtitle" id="leads-info">Cargando...</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-outline" onclick="toggleView()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span id="view-label">Vista Kanban</span>
          </button>
          <button class="btn btn-primary" onclick="openLeadModal()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nuevo lead
          </button>
        </div>
      </div>

      <!-- Filters -->
      <div style="display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap">
        <select class="form-control" id="filter-estado" style="max-width:160px" onchange="renderLeads()">
          <option value="">Todos los estados</option>
          <option value="nuevo">Nuevo</option>
          <option value="contactado">Contactado</option>
          <option value="negociacion">En negociación</option>
          <option value="cerrado">Cerrado</option>
          <option value="perdido">Perdido</option>
        </select>
        <select class="form-control" id="filter-fuente" style="max-width:160px" onchange="renderLeads()">
          <option value="">Todas las fuentes</option>
          <option value="web">Web</option>
          <option value="whatsapp">WhatsApp</option>
          <option value="instagram">Instagram</option>
          <option value="referido">Referido</option>
          <option value="llamada">Llamada</option>
          <option value="presencial">Presencial</option>
        </select>
        <div class="table-search" style="flex:1; max-width:280px">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search" placeholder="Buscar por nombre, email..." oninput="renderLeads()">
        </div>
      </div>

      <!-- Table view -->
      <div id="table-view">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Contacto</th>
                <th>Vehículo</th>
                <th>Fuente</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th style="text-align:right">Acciones</th>
              </tr>
            </thead>
            <tbody id="leads-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Kanban view -->
      <div id="kanban-view" style="display:none">
        <div class="kanban-board" id="kanban-board"></div>
      </div>

    </div>
  </main>
</div>

<!-- Lead detail modal -->
<div class="modal-overlay" id="lead-detail-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 class="modal-title" id="detail-title">Detalle del lead</h2>
      <button class="modal-close" onclick="closeModal('lead-detail-modal')" data-modal-close>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="lead-detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('lead-detail-modal')">Cerrar</button>
      <button class="btn btn-primary" id="detail-save-btn" onclick="saveNote()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Agregar nota
      </button>
    </div>
  </div>
</div>

<!-- New lead modal -->
<div class="modal-overlay" id="lead-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="lead-modal-title">Nuevo lead</h2>
      <button class="modal-close" onclick="closeModal('lead-modal')" data-modal-close>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="l-id">
      <div class="form-grid-2">
        <div class="form-group">
          <label>Nombre completo *</label>
          <input type="text" class="form-control" id="l-nombre" required>
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" class="form-control" id="l-telefono">
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" id="l-email">
      </div>
      <div class="form-group">
        <label>Vehículo de interés</label>
        <select class="form-control" id="l-vehiculo">
          <option value="">Sin especificar</option>
        </select>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>Fuente</label>
          <select class="form-control" id="l-fuente">
            <option value="web">Web</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="instagram">Instagram</option>
            <option value="referido">Referido</option>
            <option value="llamada">Llamada</option>
            <option value="presencial">Presencial</option>
          </select>
        </div>
        <div class="form-group">
          <label>Estado</label>
          <select class="form-control" id="l-estado">
            <option value="nuevo">Nuevo</option>
            <option value="contactado">Contactado</option>
            <option value="negociacion">En negociación</option>
            <option value="cerrado">Cerrado</option>
            <option value="perdido">Perdido</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Notas</label>
        <textarea class="form-control" id="l-notas" rows="3"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('lead-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveLead()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast-container"></div>

<script src="../assets/js/storage.js"></script>
<script src="../assets/js/admin/auth.js"></script>
<script src="../assets/js/admin/sidebar.js"></script>
<script>
  const session = Auth.require();
  document.getElementById('sidebar-container').innerHTML = renderSidebar('leads');
  document.getElementById('topbar-container').innerHTML = renderTopbar('Leads / CRM', '');
  initSidebar();

  let allLeads = [], allVehicles = [], allUsers = [];
  let viewMode = 'table';
  let currentLeadId = null;

  const statusMap = { nuevo: 'badge-nuevo', contactado: 'badge-contactado', negociacion: 'badge-negociacion', cerrado: 'badge-cerrado', perdido: 'badge-perdido' };
  const statusLabel = { nuevo: 'Nuevo', contactado: 'Contactado', negociacion: 'En negociación', cerrado: 'Cerrado', perdido: 'Perdido' };
  const fuenteLabel = { web: '🌐 Web', whatsapp: '💬 WhatsApp', instagram: '📸 Instagram', referido: '👤 Referido', llamada: '📞 Llamada', presencial: '🏢 Presencial' };

  window.closeModal = function(id) { document.getElementById(id).classList.remove('active'); };

  async function loadData() {
    [allLeads, allVehicles, allUsers] = await Promise.all([
      Storage.get('leads'), Storage.get('vehiculos'), Storage.get('usuarios')
    ]);
    const vSelect = document.getElementById('l-vehiculo');
    allVehicles.filter(v => v.estado !== 'vendido').forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = `${v.marca} ${v.modelo} ${v.anio} — ${formatPrice(v.precio)}`;
      vSelect.appendChild(opt);
    });
    renderLeads();
  }

  function getFiltered() {
    const search = document.getElementById('search').value.toLowerCase();
    const estado = document.getElementById('filter-estado').value;
    const fuente = document.getElementById('filter-fuente').value;
    let leads = allLeads;
    if (session.rol === 'vendedor') leads = leads.filter(l => l.vendedor_id === session.id);
    return leads.filter(l => {
      const text = `${l.nombre} ${l.email} ${l.telefono}`.toLowerCase();
      return (!search || text.includes(search))
        && (!estado || l.estado === estado)
        && (!fuente || l.fuente === fuente);
    });
  }

  function renderLeads() {
    const filtered = getFiltered();
    const nuevos = allLeads.filter(l => l.estado === 'nuevo').length;
    document.getElementById('leads-info').textContent = `${allLeads.length} total — ${nuevos} sin contactar`;

    if (viewMode === 'table') renderTable(filtered);
    else renderKanban(filtered);
  }

  function renderTable(filtered) {
    document.getElementById('leads-tbody').innerHTML = filtered.length
      ? filtered.map(l => `<tr>
          <td style="font-weight:600;color:var(--color-white)">${l.nombre}</td>
          <td style="font-size:12px">
            ${l.telefono ? `<a href="tel:${l.telefono}" style="color:var(--color-light-gray)">${l.telefono}</a><br>` : ''}
            ${l.email ? `<a href="mailto:${l.email}" style="color:var(--color-gray)">${l.email}</a>` : ''}
          </td>
          <td style="font-size:12px;color:var(--color-light-gray)">${l.vehiculo_texto || '—'}</td>
          <td style="font-size:12px">${fuenteLabel[l.fuente] || l.fuente}</td>
          <td><span class="status-badge ${statusMap[l.estado]}">${statusLabel[l.estado]}</span></td>
          <td style="font-size:12px;color:var(--color-gray)">${l.fecha_creacion ? l.fecha_creacion.slice(0,10) : '—'}</td>
          <td>
            <div class="td-actions" style="justify-content:flex-end">
              ${l.telefono ? `<a href="https://wa.me/${l.telefono}" target="_blank" class="action-btn action-btn-success" title="WhatsApp">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
              </a>` : ''}
              <button class="action-btn action-btn-edit" onclick="openLeadDetail('${l.id}')" title="Ver detalle">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </button>
              <button class="action-btn action-btn-edit" onclick="openLeadModal('${l.id}')" title="Editar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="action-btn action-btn-delete" onclick="deleteLead('${l.id}')" title="Eliminar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
              </button>
            </div>
          </td>
        </tr>`).join('')
      : '<tr><td colspan="7" class="text-muted" style="padding:32px;text-align:center">No hay leads que coincidan</td></tr>';
  }

  function renderKanban(filtered) {
    const cols = ['nuevo', 'contactado', 'negociacion', 'cerrado', 'perdido'];
    const colColors = { nuevo: 'var(--color-info)', contactado: 'var(--color-warning)', negociacion: '#ff8c69', cerrado: 'var(--color-success)', perdido: 'var(--color-danger)' };
    const board = document.getElementById('kanban-board');
    board.innerHTML = cols.map(estado => {
      const cards = filtered.filter(l => l.estado === estado);
      return `<div class="kanban-col kanban-col-${estado}">
        <div class="kanban-col-header">
          <span class="kanban-col-title" style="color:${colColors[estado]}">${statusLabel[estado].toUpperCase()}</span>
          <span class="kanban-col-count">${cards.length}</span>
        </div>
        <div class="kanban-cards" ondragover="event.preventDefault()" ondrop="dropLead(event,'${estado}')">
          ${cards.map(l => `
            <div class="kanban-card" draggable="true" ondragstart="dragLead(event,'${l.id}')" onclick="openLeadDetail('${l.id}')">
              <p class="kanban-card-name">${l.nombre}</p>
              <p class="kanban-card-vehicle">${l.vehiculo_texto || 'Sin vehículo'}</p>
              <div class="kanban-card-meta">
                <span>${fuenteLabel[l.fuente] || l.fuente}</span>
                <span>${l.fecha_creacion ? l.fecha_creacion.slice(0,10) : ''}</span>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    }).join('');
  }

  let draggingId = null;
  function dragLead(e, id) { draggingId = id; e.dataTransfer.effectAllowed = 'move'; }

  async function dropLead(e, estado) {
    e.preventDefault();
    if (!draggingId) return;
    await Storage.update('leads', draggingId, { estado, ultima_actividad: new Date().toISOString() });
    allLeads = await Storage.get('leads');
    renderLeads();
    showToast('Lead movido a ' + statusLabel[estado], 'success', 2000);
    draggingId = null;
  }

  function toggleView() {
    viewMode = viewMode === 'table' ? 'kanban' : 'table';
    document.getElementById('table-view').style.display = viewMode === 'table' ? '' : 'none';
    document.getElementById('kanban-view').style.display = viewMode === 'kanban' ? '' : 'none';
    document.getElementById('view-label').textContent = viewMode === 'table' ? 'Vista Kanban' : 'Vista Tabla';
    renderLeads();
  }

  function openLeadDetail(id) {
    currentLeadId = id;
    const l = allLeads.find(x => x.id === id);
    if (!l) return;
    document.getElementById('detail-title').textContent = `Lead — ${l.nombre}`;
    const v = allVehicles.find(x => x.id === l.vehiculo_id);
    document.getElementById('lead-detail-body').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
        <div>
          <p style="font-size:12px;color:var(--color-gray);margin-bottom:2px">Nombre</p>
          <p style="font-weight:600;color:var(--color-white)">${l.nombre}</p>
        </div>
        <div>
          <p style="font-size:12px;color:var(--color-gray);margin-bottom:2px">Teléfono</p>
          <p>${l.telefono ? `<a href="tel:${l.telefono}" style="color:var(--color-primary)">${l.telefono}</a>` : '—'}</p>
        </div>
        <div>
          <p style="font-size:12px;color:var(--color-gray);margin-bottom:2px">Email</p>
          <p>${l.email || '—'}</p>
        </div>
        <div>
          <p style="font-size:12px;color:var(--color-gray);margin-bottom:2px">Fuente</p>
          <p>${fuenteLabel[l.fuente] || l.fuente}</p>
        </div>
        <div>
          <p style="font-size:12px;color:var(--color-gray);margin-bottom:2px">Vehículo de interés</p>
          <p>${l.vehiculo_texto || '—'} ${v ? `<a href="../vehiculo.html?id=${v.id}" target="_blank" style="color:var(--color-primary);font-size:12px">→ Ver</a>` : ''}</p>
        </div>
        <div>
          <p style="font-size:12px;color:var(--color-gray);margin-bottom:2px">Estado</p>
          <select class="form-control" style="padding:4px 8px;font-size:12px;width:auto" onchange="changeLeadStatus('${l.id}',this.value)">
            ${['nuevo','contactado','negociacion','cerrado','perdido'].map(s=>
              `<option value="${s}" ${l.estado===s?'selected':''}>${statusLabel[s]}</option>`
            ).join('')}
          </select>
        </div>
      </div>
      <div style="border-top:1px solid var(--color-dark-3);padding-top:16px;margin-bottom:16px">
        <p style="font-size:13px;font-weight:700;margin-bottom:12px">Historial de interacciones</p>
        <div style="display:flex;flex-direction:column;gap:10px;max-height:200px;overflow-y:auto">
          ${(l.historial || []).map(h => `
            <div style="background:var(--color-dark-3);border-radius:8px;padding:10px 12px">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:11px;font-weight:700;color:var(--color-primary);text-transform:uppercase">${h.tipo}</span>
                <span style="font-size:11px;color:var(--color-gray)">${h.fecha ? h.fecha.slice(0,16).replace('T',' ') : ''}</span>
              </div>
              <p style="font-size:13px;color:var(--color-light-gray)">${h.nota}</p>
            </div>`).join('') || '<p style="color:var(--color-gray);font-size:13px">Sin interacciones registradas</p>'}
        </div>
      </div>
      <div>
        <p style="font-size:13px;font-weight:700;margin-bottom:8px">Agregar nota / actividad</p>
        <div class="form-grid-2" style="margin-bottom:8px">
          <select class="form-control" id="note-tipo">
            <option value="nota">Nota</option>
            <option value="llamada">Llamada</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="visita">Visita</option>
            <option value="email">Email</option>
          </select>
        </div>
        <textarea class="form-control" id="note-text" rows="2" placeholder="Escribí tu nota aquí..."></textarea>
      </div>`;
    document.getElementById('lead-detail-modal').classList.add('active');
  }

  async function changeLeadStatus(id, estado) {
    await Storage.update('leads', id, { estado, ultima_actividad: new Date().toISOString() });
    allLeads = await Storage.get('leads');
    renderLeads();
    showToast('Estado actualizado', 'success', 2000);
  }

  window.saveNote = async function() {
    const text = document.getElementById('note-text').value.trim();
    if (!text || !currentLeadId) return;
    const tipo = document.getElementById('note-tipo').value;
    const lead = allLeads.find(l => l.id === currentLeadId);
    const historial = [...(lead.historial || []), {
      fecha: new Date().toISOString(),
      tipo,
      nota: text
    }];
    await Storage.update('leads', currentLeadId, { historial, ultima_actividad: new Date().toISOString() });
    allLeads = await Storage.get('leads');
    renderLeads();
    openLeadDetail(currentLeadId);
    showToast('Nota agregada', 'success', 2000);
  };

  function openLeadModal(id = null) {
    document.getElementById('l-id').value = id || '';
    document.getElementById('lead-modal-title').textContent = id ? 'Editar lead' : 'Nuevo lead';
    if (id) {
      const l = allLeads.find(x => x.id === id);
      document.getElementById('l-nombre').value = l.nombre;
      document.getElementById('l-telefono').value = l.telefono || '';
      document.getElementById('l-email').value = l.email || '';
      document.getElementById('l-vehiculo').value = l.vehiculo_id || '';
      document.getElementById('l-fuente').value = l.fuente;
      document.getElementById('l-estado').value = l.estado;
      document.getElementById('l-notas').value = l.notas || '';
    } else {
      document.getElementById('l-nombre').value = '';
      document.getElementById('l-telefono').value = '';
      document.getElementById('l-email').value = '';
      document.getElementById('l-vehiculo').value = '';
      document.getElementById('l-fuente').value = 'web';
      document.getElementById('l-estado').value = 'nuevo';
      document.getElementById('l-notas').value = '';
    }
    document.getElementById('lead-modal').classList.add('active');
  }

  async function saveLead() {
    const nombre = document.getElementById('l-nombre').value.trim();
    if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }
    const vid = document.getElementById('l-vehiculo').value;
    const v = allVehicles.find(x => x.id === vid);
    const data = {
      nombre,
      telefono: document.getElementById('l-telefono').value.trim(),
      email: document.getElementById('l-email').value.trim(),
      vehiculo_id: vid || null,
      vehiculo_texto: v ? `${v.marca} ${v.modelo} ${v.anio}` : '',
      fuente: document.getElementById('l-fuente').value,
      estado: document.getElementById('l-estado').value,
      notas: document.getElementById('l-notas').value.trim(),
      ultima_actividad: new Date().toISOString(),
    };
    const id = document.getElementById('l-id').value;
    if (id) {
      await Storage.update('leads', id, data);
      showToast('Lead actualizado', 'success');
    } else {
      data.id = Storage.generateId('l');
      data.fecha_creacion = new Date().toISOString();
      data.historial = [];
      await Storage.add('leads', data);
      showToast('Lead creado', 'success');
    }
    document.getElementById('lead-modal').classList.remove('active');
    allLeads = await Storage.get('leads');
    renderLeads();
  }

  async function deleteLead(id) {
    const l = allLeads.find(x => x.id === id);
    confirmAction(`¿Eliminar el lead de "${l.nombre}"?`, async () => {
      await Storage.delete('leads', id);
      allLeads = await Storage.get('leads');
      renderLeads();
      showToast('Lead eliminado', 'success');
    });
  }

  loadData();
</script>
</body>
</html>

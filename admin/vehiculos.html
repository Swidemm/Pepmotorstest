<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehículos — PEP Motors Admin</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="admin-layout" id="admin-layout">
  <div id="sidebar-container"></div>
  <main class="admin-main">
    <div id="topbar-container"></div>
    <div class="admin-content">

      <div class="page-header-admin flex justify-between items-center mb-6">
        <div>
          <h1 class="page-title">Inventario</h1>
          <p class="page-subtitle" id="stock-info">Cargando...</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-outline" onclick="exportCSV()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Exportar
          </button>
          <button class="btn btn-primary" onclick="openVehicleModal()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nuevo vehículo
          </button>
        </div>
      </div>

      <!-- Filters -->
      <div style="display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap">
        <select class="form-control" id="filter-estado" style="max-width:160px" onchange="renderTable()">
          <option value="">Todos los estados</option>
          <option value="disponible">Disponible</option>
          <option value="reservado">Reservado</option>
          <option value="vendido">Vendido</option>
          <option value="revision">En revisión</option>
        </select>
        <select class="form-control" id="filter-condicion" style="max-width:140px" onchange="renderTable()">
          <option value="">Toda condición</option>
          <option value="0km">0KM</option>
          <option value="usado">Usado</option>
        </select>
        <div class="table-search" style="flex:1; max-width:300px">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search" placeholder="Buscar por marca, modelo..." oninput="renderTable()">
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Vehículo</th>
              <th>Año</th>
              <th>Km</th>
              <th>Precio</th>
              <th>Estado</th>
              <th>Destacado</th>
              <th style="text-align:right">Acciones</th>
            </tr>
          </thead>
          <tbody id="vehicles-tbody">
            <tr><td colspan="7"><div class="skeleton" style="height:16px; margin:8px 0"></div></td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<!-- VEHICLE MODAL -->
<div class="modal-overlay" id="vehicle-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Nuevo vehículo</h2>
      <button class="modal-close" onclick="closeVehicleModal()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="vehicle-form">
        <input type="hidden" id="v-id">

        <!-- Datos básicos -->
        <div class="form-section">
          <p class="form-section-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            Datos básicos
          </p>
          <div class="form-grid-3">
            <div class="form-group">
              <label>Condición</label>
              <select class="form-control" id="v-condicion" required>
                <option value="usado">Usado</option>
                <option value="0km">0KM</option>
              </select>
            </div>
            <div class="form-group">
              <label>Marca</label>
              <input type="text" class="form-control" id="v-marca" placeholder="Toyota" required>
            </div>
            <div class="form-group">
              <label>Modelo</label>
              <input type="text" class="form-control" id="v-modelo" placeholder="Corolla" required>
            </div>
          </div>
          <div class="form-grid-3">
            <div class="form-group" style="grid-column:span 2">
              <label>Versión</label>
              <input type="text" class="form-control" id="v-version" placeholder="XEI 2.0 CVT">
            </div>
            <div class="form-group">
              <label>Año</label>
              <input type="number" class="form-control" id="v-anio" min="1990" max="2030" required>
            </div>
          </div>
          <div class="form-grid-2">
            <div class="form-group">
              <label>Color</label>
              <input type="text" class="form-control" id="v-color" placeholder="Blanco Perlado">
            </div>
            <div class="form-group">
              <label>Puertas</label>
              <select class="form-control" id="v-puertas">
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" selected>4</option>
                <option value="5">5</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Motor -->
        <div class="form-section">
          <p class="form-section-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
            Motor y mecánica
          </p>
          <div class="form-grid-3">
            <div class="form-group">
              <label>Kilometraje</label>
              <input type="number" class="form-control" id="v-km" min="0" placeholder="0">
            </div>
            <div class="form-group">
              <label>Combustible</label>
              <select class="form-control" id="v-combustible">
                <option value="nafta">Nafta</option>
                <option value="diesel">Diesel</option>
                <option value="hibrido">Híbrido</option>
                <option value="electrico">Eléctrico</option>
                <option value="gnc">GNC</option>
              </select>
            </div>
            <div class="form-group">
              <label>Transmisión</label>
              <select class="form-control" id="v-transmision">
                <option value="manual">Manual</option>
                <option value="automatica">Automática</option>
              </select>
            </div>
          </div>
          <div class="form-grid-3">
            <div class="form-group">
              <label>Motor</label>
              <input type="text" class="form-control" id="v-motor" placeholder="2.0 VVT-i">
            </div>
            <div class="form-group">
              <label>Potencia</label>
              <input type="text" class="form-control" id="v-potencia" placeholder="170 CV">
            </div>
            <div class="form-group">
              <label>Tracción</label>
              <select class="form-control" id="v-traccion">
                <option value="delantera">Delantera</option>
                <option value="trasera">Trasera</option>
                <option value="4x4">4x4</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Precios -->
        <div class="form-section">
          <p class="form-section-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
            Precios
          </p>
          <div class="form-grid-2">
            <div class="form-group">
              <label>Precio de venta (ARS)</label>
              <input type="number" class="form-control" id="v-precio" min="0" required placeholder="25000000">
            </div>
            <div class="form-group" id="cost-group">
              <label>Precio de costo (ARS)</label>
              <input type="number" class="form-control" id="v-precio-costo" min="0" placeholder="21000000">
            </div>
          </div>
          <div style="display:flex; gap:20px; flex-wrap:wrap">
            <label class="form-check"><input type="checkbox" id="v-permuta"> Acepta permuta</label>
            <label class="form-check"><input type="checkbox" id="v-financiable" checked> Financiable</label>
          </div>
        </div>

        <!-- Estado -->
        <div class="form-section">
          <p class="form-section-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Estado
          </p>
          <div class="form-grid-2">
            <div class="form-group">
              <label>Estado</label>
              <select class="form-control" id="v-estado">
                <option value="disponible">Disponible</option>
                <option value="reservado">Reservado</option>
                <option value="vendido">Vendido</option>
                <option value="revision">En revisión</option>
              </select>
            </div>
            <div class="form-group" style="display:flex; align-items:flex-end; padding-bottom:2px">
              <label class="form-check"><input type="checkbox" id="v-destacado"> Destacado en home</label>
            </div>
          </div>
        </div>

        <!-- Fotos -->
        <div class="form-section">
          <p class="form-section-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            Fotos
          </p>
          <div class="upload-area" id="upload-area" onclick="document.getElementById('foto-input').click()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <p>Arrastrá imágenes acá o <span>hacé click para seleccionar</span></p>
            <p style="font-size:11px; margin-top:4px">JPG, PNG — Máx 5MB por imagen</p>
          </div>
          <input type="file" id="foto-input" multiple accept="image/*" style="display:none" onchange="handlePhotos(this.files)">
          <div class="photos-preview" id="photos-preview"></div>
        </div>

        <!-- Descripción -->
        <div class="form-section">
          <p class="form-section-title">Descripción</p>
          <div class="form-group">
            <textarea class="form-control" id="v-descripcion" rows="4" placeholder="Descripción del vehículo visible al público..."></textarea>
          </div>
        </div>

        <!-- Equipamiento -->
        <div class="form-section">
          <p class="form-section-title">Equipamiento</p>
          <div class="form-check-grid" id="equip-grid">
            <!-- Generado por JS -->
          </div>
        </div>

        <!-- Datos técnicos -->
        <div class="form-section">
          <p class="form-section-title">Datos técnicos</p>
          <div class="form-grid-2">
            <div class="form-group">
              <label>N° de dominio</label>
              <input type="text" class="form-control" id="v-dominio" placeholder="AB123CD">
            </div>
            <div class="form-group">
              <label>N° de chasis</label>
              <input type="text" class="form-control" id="v-chasis" placeholder="XXXXXXXXXXXXXXXXX">
            </div>
          </div>
          <div class="form-group">
            <label>Observaciones internas <span style="color:var(--color-gray);font-weight:normal">(no visible al público)</span></label>
            <textarea class="form-control" id="v-obs" rows="2" placeholder="Notas internas..."></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeVehicleModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveVehicle()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Guardar
      </button>
    </div>
  </div>
</div>

<div class="toast-container"></div>

<script src="../assets/js/storage.js"></script>
<script src="../assets/js/admin/auth.js"></script>
<script src="../assets/js/admin/sidebar.js"></script>
<script>
  const session = Auth.require();
  document.getElementById('sidebar-container').innerHTML = renderSidebar('vehiculos');
  document.getElementById('topbar-container').innerHTML = renderTopbar('Inventario', '');
  initSidebar();

  // Hide cost for vendedores
  if (session.rol === 'vendedor') {
    document.getElementById('cost-group').style.display = 'none';
  }

  const EQUIPAMIENTO = [
    { key: 'aire_acondicionado', label: 'Aire acondicionado' },
    { key: 'direccion_hidraulica', label: 'Dirección hidráulica' },
    { key: 'vidrios_electricos', label: 'Vidrios eléctricos' },
    { key: 'cierre_centralizado', label: 'Cierre centralizado' },
    { key: 'abs', label: 'ABS' },
    { key: 'airbag', label: 'Airbag' },
    { key: 'alarma', label: 'Alarma' },
    { key: 'tapizado_cuero', label: 'Tapizado cuero' },
    { key: 'techo_solar', label: 'Techo solar' },
    { key: 'bluetooth', label: 'Bluetooth' },
    { key: 'pantalla_tactil', label: 'Pantalla táctil' },
    { key: 'camara_trasera', label: 'Cámara trasera' },
    { key: 'sensores_estacionamiento', label: 'Sensores de estacionamiento' },
  ];

  document.getElementById('equip-grid').innerHTML = EQUIPAMIENTO.map(e =>
    `<label class="form-check"><input type="checkbox" value="${e.key}" class="equip-check"> ${e.label}</label>`
  ).join('');

  let allVehicles = [];
  let currentPhotos = [];
  let editingId = null;

  const statusMap = { disponible: 'badge-disponible', reservado: 'badge-reservado', vendido: 'badge-vendido', revision: 'badge-revision' };

  async function loadVehicles() {
    allVehicles = await Storage.get('vehiculos');
    renderTable();
    const disponibles = allVehicles.filter(v => v.estado === 'disponible').length;
    document.getElementById('stock-info').textContent = `${allVehicles.length} total — ${disponibles} disponibles`;
  }

  function renderTable() {
    const search = document.getElementById('search').value.toLowerCase();
    const estado = document.getElementById('filter-estado').value;
    const condicion = document.getElementById('filter-condicion').value;

    let filtered = allVehicles.filter(v => {
      const text = `${v.marca} ${v.modelo} ${v.version}`.toLowerCase();
      return (!search || text.includes(search))
        && (!estado || v.estado === estado)
        && (!condicion || v.condicion === condicion);
    });

    document.getElementById('vehicles-tbody').innerHTML = filtered.length
      ? filtered.map(v => `
        <tr>
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:48px;height:36px;border-radius:6px;background:var(--color-dark-3);flex-shrink:0;overflow:hidden">
                ${v.fotos && v.fotos.length ? `<img src="${v.fotos[0]}" style="width:100%;height:100%;object-fit:cover">` : ''}
              </div>
              <div>
                <p style="font-weight:600;color:var(--color-white);font-size:13px">${v.marca} ${v.modelo}</p>
                <p style="font-size:11px;color:var(--color-gray)">${v.version} · <span style="color:${v.condicion==='0km'?'var(--color-primary)':'var(--color-light-gray)'}">${v.condicion.toUpperCase()}</span></p>
              </div>
            </div>
          </td>
          <td>${v.anio}</td>
          <td>${formatKm(v.km)}</td>
          <td style="font-weight:600;color:var(--color-white)">${formatPrice(v.precio)}</td>
          <td>
            <select class="form-control" style="padding:4px 8px;font-size:12px;width:auto" onchange="quickStatus('${v.id}', this.value)">
              <option value="disponible" ${v.estado==='disponible'?'selected':''}>Disponible</option>
              <option value="reservado" ${v.estado==='reservado'?'selected':''}>Reservado</option>
              <option value="vendido" ${v.estado==='vendido'?'selected':''}>Vendido</option>
              <option value="revision" ${v.estado==='revision'?'selected':''}>En revisión</option>
            </select>
          </td>
          <td>
            <span style="color:${v.destacado?'var(--color-warning)':'var(--color-gray)'}">${v.destacado?'★ Sí':'—'}</span>
          </td>
          <td>
            <div class="td-actions" style="justify-content:flex-end">
              <a href="../vehiculo.html?id=${v.id}" target="_blank" class="action-btn action-btn-view" title="Ver en sitio">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              </a>
              <button class="action-btn action-btn-view" title="Duplicar" onclick="duplicateVehicle('${v.id}')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              </button>
              <button class="action-btn action-btn-edit" title="Editar" onclick="openVehicleModal('${v.id}')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="action-btn action-btn-delete" title="Eliminar" onclick="deleteVehicle('${v.id}')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            </div>
          </td>
        </tr>`).join('')
      : '<tr><td colspan="7" class="text-muted" style="padding:32px;text-align:center">No hay vehículos que coincidan</td></tr>';
  }

  async function quickStatus(id, status) {
    await Storage.update('vehiculos', id, { estado: status });
    allVehicles = await Storage.get('vehiculos');
    showToast('Estado actualizado', 'success', 2000);
  }

  function openVehicleModal(id = null) {
    editingId = id;
    currentPhotos = [];
    document.getElementById('vehicle-form').reset();
    document.getElementById('photos-preview').innerHTML = '';
    document.querySelectorAll('.equip-check').forEach(c => c.checked = false);

    if (id) {
      const v = allVehicles.find(x => x.id === id);
      if (!v) return;
      document.getElementById('modal-title').textContent = 'Editar vehículo';
      document.getElementById('v-id').value = v.id;
      document.getElementById('v-condicion').value = v.condicion;
      document.getElementById('v-marca').value = v.marca;
      document.getElementById('v-modelo').value = v.modelo;
      document.getElementById('v-version').value = v.version || '';
      document.getElementById('v-anio').value = v.anio;
      document.getElementById('v-color').value = v.color || '';
      document.getElementById('v-puertas').value = v.puertas || 4;
      document.getElementById('v-km').value = v.km || 0;
      document.getElementById('v-combustible').value = v.combustible || 'nafta';
      document.getElementById('v-transmision').value = v.transmision || 'manual';
      document.getElementById('v-motor').value = v.motor || '';
      document.getElementById('v-potencia').value = v.potencia || '';
      document.getElementById('v-traccion').value = v.traccion || 'delantera';
      document.getElementById('v-precio').value = v.precio || '';
      document.getElementById('v-precio-costo').value = v.precio_costo || '';
      document.getElementById('v-permuta').checked = v.acepta_permuta;
      document.getElementById('v-financiable').checked = v.financiable;
      document.getElementById('v-estado').value = v.estado;
      document.getElementById('v-destacado').checked = v.destacado;
      document.getElementById('v-descripcion').value = v.descripcion || '';
      document.getElementById('v-dominio').value = v.dominio || '';
      document.getElementById('v-chasis').value = v.chasis || '';
      document.getElementById('v-obs').value = v.obs_internas || '';
      currentPhotos = [...(v.fotos || [])];
      if (v.equipamiento) {
        document.querySelectorAll('.equip-check').forEach(c => {
          c.checked = v.equipamiento.includes(c.value);
        });
      }
      renderPhotoPreview();
    } else {
      document.getElementById('modal-title').textContent = 'Nuevo vehículo';
      document.getElementById('v-anio').value = new Date().getFullYear();
    }

    document.getElementById('vehicle-modal').classList.add('active');
  }

  function closeVehicleModal() {
    document.getElementById('vehicle-modal').classList.remove('active');
  }

  function handlePhotos(files) {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        currentPhotos.push(e.target.result);
        renderPhotoPreview();
      };
      reader.readAsDataURL(file);
    });
  }

  function renderPhotoPreview() {
    const preview = document.getElementById('photos-preview');
    preview.innerHTML = currentPhotos.map((src, i) => `
      <div class="photo-thumb ${i === 0 ? 'is-main' : ''}">
        <img src="${src}" alt="foto ${i+1}">
        ${i === 0 ? '<span class="photo-main-badge">Principal</span>' : ''}
        <div class="photo-thumb-overlay">
          ${i > 0 ? `<button type="button" onclick="setMainPhoto(${i})" title="Principal">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>` : ''}
          <button type="button" onclick="removePhoto(${i})" title="Eliminar">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>`).join('');
  }

  function setMainPhoto(idx) {
    const [photo] = currentPhotos.splice(idx, 1);
    currentPhotos.unshift(photo);
    renderPhotoPreview();
  }

  function removePhoto(idx) {
    currentPhotos.splice(idx, 1);
    renderPhotoPreview();
  }

  // Drag & drop
  const uploadArea = document.getElementById('upload-area');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    handlePhotos(e.dataTransfer.files);
  });

  async function saveVehicle() {
    const equipamiento = [...document.querySelectorAll('.equip-check:checked')].map(c => c.value);
    const data = {
      condicion: document.getElementById('v-condicion').value,
      marca: document.getElementById('v-marca').value.trim(),
      modelo: document.getElementById('v-modelo').value.trim(),
      version: document.getElementById('v-version').value.trim(),
      anio: parseInt(document.getElementById('v-anio').value),
      color: document.getElementById('v-color').value.trim(),
      puertas: parseInt(document.getElementById('v-puertas').value),
      km: parseInt(document.getElementById('v-km').value) || 0,
      combustible: document.getElementById('v-combustible').value,
      transmision: document.getElementById('v-transmision').value,
      motor: document.getElementById('v-motor').value.trim(),
      potencia: document.getElementById('v-potencia').value.trim(),
      traccion: document.getElementById('v-traccion').value,
      precio: parseFloat(document.getElementById('v-precio').value) || 0,
      precio_costo: parseFloat(document.getElementById('v-precio-costo').value) || 0,
      acepta_permuta: document.getElementById('v-permuta').checked,
      financiable: document.getElementById('v-financiable').checked,
      estado: document.getElementById('v-estado').value,
      destacado: document.getElementById('v-destacado').checked,
      descripcion: document.getElementById('v-descripcion').value.trim(),
      equipamiento,
      dominio: document.getElementById('v-dominio').value.trim() || null,
      chasis: document.getElementById('v-chasis').value.trim() || null,
      obs_internas: document.getElementById('v-obs').value.trim(),
      fotos: currentPhotos,
      foto_principal: 0,
    };

    if (!data.marca || !data.modelo || !data.precio) {
      showToast('Completá los campos obligatorios', 'error');
      return;
    }

    if (editingId) {
      await Storage.update('vehiculos', editingId, data);
      showToast('Vehículo actualizado', 'success');
    } else {
      data.id = Storage.generateId('v');
      data.fecha_ingreso = new Date().toISOString().slice(0, 10);
      data.fecha_venta = null;
      await Storage.add('vehiculos', data);
      showToast('Vehículo agregado al inventario', 'success');
    }

    closeVehicleModal();
    allVehicles = await Storage.get('vehiculos');
    renderTable();
    const disponibles = allVehicles.filter(v => v.estado === 'disponible').length;
    document.getElementById('stock-info').textContent = `${allVehicles.length} total — ${disponibles} disponibles`;
  }

  async function deleteVehicle(id) {
    const v = allVehicles.find(x => x.id === id);
    confirmAction(`¿Eliminar "${v.marca} ${v.modelo} ${v.anio}"? Esta acción no se puede deshacer.`, async () => {
      await Storage.delete('vehiculos', id);
      allVehicles = await Storage.get('vehiculos');
      renderTable();
      showToast('Vehículo eliminado', 'success');
    });
  }

  async function duplicateVehicle(id) {
    const v = allVehicles.find(x => x.id === id);
    if (!v) return;
    const copy = { ...v, id: Storage.generateId('v'), estado: 'disponible', fecha_ingreso: new Date().toISOString().slice(0,10), fecha_venta: null };
    await Storage.add('vehiculos', copy);
    allVehicles = await Storage.get('vehiculos');
    renderTable();
    showToast('Vehículo duplicado', 'success');
  }

  function exportCSV() {
    const headers = ['ID','Marca','Modelo','Versión','Año','KM','Precio','Estado','Condición'];
    const rows = allVehicles.map(v => [v.id,v.marca,v.modelo,v.version,v.anio,v.km,v.precio,v.estado,v.condicion]);
    const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'pepmotors-inventario.csv';
    a.click();
  }

  loadVehicles();
</script>
</body>
</html>

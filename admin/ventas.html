<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventas — PEP Motors Admin</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="admin-layout" id="admin-layout">
  <div id="sidebar-container"></div>
  <main class="admin-main">
    <div id="topbar-container"></div>
    <div class="admin-content">

      <div class="page-header-admin flex justify-between items-center mb-6">
        <div>
          <h1 class="page-title">Ventas</h1>
          <p class="page-subtitle" id="ventas-info">Cargando...</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openVentaModal()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Registrar venta
          </button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid-admin" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
        <div class="stat-card">
          <div class="stat-card-header"><span class="stat-card-label">Ventas este mes</span><div class="stat-card-icon green"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div></div>
          <p class="stat-card-value" id="stat-mes">—</p>
        </div>
        <div class="stat-card">
          <div class="stat-card-header"><span class="stat-card-label">Total vendido (mes)</span><div class="stat-card-icon red"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div></div>
          <p class="stat-card-value" id="stat-total" style="font-size:22px">—</p>
        </div>
        <div class="stat-card">
          <div class="stat-card-header"><span class="stat-card-label">Total histórico</span><div class="stat-card-icon blue"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div></div>
          <p class="stat-card-value" id="stat-historico" style="font-size:22px">—</p>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
        <select class="form-control" id="filter-mes" style="max-width:160px" onchange="renderVentas()">
          <option value="">Todos los meses</option>
        </select>
        <div class="table-search" style="flex:1;max-width:280px">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search" placeholder="Buscar por cliente, vehículo..." oninput="renderVentas()">
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Vehículo</th>
              <th>Cliente</th>
              <th>Precio final</th>
              <th>Forma de pago</th>
              <th>Vendedor</th>
              <th>Fecha</th>
              <th style="text-align:right">Acciones</th>
            </tr>
          </thead>
          <tbody id="ventas-tbody"></tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<!-- Venta modal -->
<div class="modal-overlay" id="venta-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 class="modal-title">Registrar venta</h2>
      <button class="modal-close" onclick="document.getElementById('venta-modal').classList.remove('active')">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Vehículo *</label>
        <select class="form-control" id="vt-vehiculo" required></select>
      </div>
      <div class="form-group">
        <label>Cliente *</label>
        <select class="form-control" id="vt-cliente" required></select>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>Precio lista</label>
          <input type="number" class="form-control" id="vt-precio-lista" readonly>
        </div>
        <div class="form-group">
          <label>Precio final *</label>
          <input type="number" class="form-control" id="vt-precio-final" required>
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>Forma de pago</label>
          <select class="form-control" id="vt-pago">
            <option value="contado">Contado</option>
            <option value="financiado">Financiado</option>
            <option value="plan_ahorro">Plan de ahorro</option>
            <option value="permuta">Permuta + diferencia</option>
          </select>
        </div>
        <div class="form-group">
          <label>Fecha de venta</label>
          <input type="date" class="form-control" id="vt-fecha">
        </div>
      </div>
      <div class="form-group">
        <label>Observaciones</label>
        <textarea class="form-control" id="vt-obs" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="document.getElementById('venta-modal').classList.remove('active')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveVenta()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Confirmar venta
      </button>
    </div>
  </div>
</div>

<div class="toast-container"></div>

<script src="../assets/js/storage.js"></script>
<script src="../assets/js/admin/auth.js"></script>
<script src="../assets/js/admin/sidebar.js"></script>
<script>
  const session = Auth.require();
  document.getElementById('sidebar-container').innerHTML = renderSidebar('ventas');
  document.getElementById('topbar-container').innerHTML = renderTopbar('Ventas', '');
  initSidebar();

  let allVentas = [], allVehiculos = [], allLeads = [], allUsers = [];

  const pagoLabel = { contado: 'Contado', financiado: 'Financiado', plan_ahorro: 'Plan de ahorro', permuta: 'Permuta + diferencia' };

  async function loadData() {
    [allVentas, allVehiculos, allLeads, allUsers] = await Promise.all([
      Storage.get('ventas'), Storage.get('vehiculos'), Storage.get('leads'), Storage.get('usuarios')
    ]);
    buildMesFilter();
    renderVentas();
    updateStats();
  }

  function buildMesFilter() {
    const meses = [...new Set(allVentas.map(v => v.fecha_venta && v.fecha_venta.slice(0,7)))].filter(Boolean).sort().reverse();
    const sel = document.getElementById('filter-mes');
    meses.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      sel.appendChild(opt);
    });
  }

  function updateStats() {
    const mesActual = new Date().toISOString().slice(0, 7);
    const ventasMes = allVentas.filter(v => v.fecha_venta && v.fecha_venta.slice(0,7) === mesActual);
    const totalMes = ventasMes.reduce((s, v) => s + (v.precio_final || 0), 0);
    const totalHist = allVentas.reduce((s, v) => s + (v.precio_final || 0), 0);
    document.getElementById('stat-mes').textContent = ventasMes.length;
    document.getElementById('stat-total').textContent = formatPrice(totalMes);
    document.getElementById('stat-historico').textContent = formatPrice(totalHist);
    document.getElementById('ventas-info').textContent = `${allVentas.length} ventas registradas`;
  }

  function renderVentas() {
    const search = document.getElementById('search').value.toLowerCase();
    const mes = document.getElementById('filter-mes').value;
    let filtered = allVentas;
    if (session.rol === 'vendedor') filtered = filtered.filter(v => v.vendedor_id === session.id);
    filtered = filtered.filter(v => {
      const text = `${v.cliente_nombre} ${v.vehiculo_texto}`.toLowerCase();
      return (!search || text.includes(search)) && (!mes || (v.fecha_venta && v.fecha_venta.startsWith(mes)));
    }).sort((a,b) => new Date(b.fecha_venta) - new Date(a.fecha_venta));

    document.getElementById('ventas-tbody').innerHTML = filtered.length
      ? filtered.map(v => {
          const user = allUsers.find(u => u.id === v.vendedor_id);
          return `<tr>
            <td style="font-weight:600;color:var(--color-white);font-size:13px">${v.vehiculo_texto}</td>
            <td style="font-size:13px">${v.cliente_nombre}</td>
            <td style="font-weight:700;color:var(--color-success)">${formatPrice(v.precio_final)}</td>
            <td style="font-size:12px">${pagoLabel[v.forma_pago] || v.forma_pago}</td>
            <td style="font-size:12px;color:var(--color-light-gray)">${user ? user.nombre : '—'}</td>
            <td style="font-size:12px;color:var(--color-gray)">${v.fecha_venta || '—'}</td>
            <td>
              <div class="td-actions" style="justify-content:flex-end">
                <button class="action-btn action-btn-delete" onclick="deleteVenta('${v.id}')">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
                </button>
              </div>
            </td>
          </tr>`;}).join('')
      : '<tr><td colspan="7" class="text-muted" style="padding:32px;text-align:center">No hay ventas registradas</td></tr>';
  }

  function openVentaModal() {
    const vSelect = document.getElementById('vt-vehiculo');
    const cSelect = document.getElementById('vt-cliente');
    vSelect.innerHTML = '<option value="">Seleccionar vehículo</option>';
    cSelect.innerHTML = '<option value="">Seleccionar cliente</option>';
    allVehiculos.filter(v => v.estado === 'disponible').forEach(v => {
      const o = document.createElement('option');
      o.value = v.id;
      o.textContent = `${v.marca} ${v.modelo} ${v.anio} — ${formatPrice(v.precio)}`;
      o.dataset.precio = v.precio;
      vSelect.appendChild(o);
    });
    const uniqueNames = new Set();
    allLeads.forEach(l => {
      if (!l.nombre || uniqueNames.has(l.id)) return;
      uniqueNames.add(l.id);
      const o = document.createElement('option');
      o.value = l.id;
      o.textContent = l.nombre + (l.email ? ` — ${l.email}` : l.telefono ? ` — ${l.telefono}` : '');
      o.dataset.nombre = l.nombre;
      cSelect.appendChild(o);
    });
    document.getElementById('vt-precio-lista').value = '';
    document.getElementById('vt-precio-final').value = '';
    document.getElementById('vt-fecha').value = new Date().toISOString().slice(0,10);
    document.getElementById('vt-obs').value = '';
    document.getElementById('venta-modal').classList.add('active');
  }

  document.addEventListener('change', e => {
    if (e.target.id === 'vt-vehiculo') {
      const opt = e.target.selectedOptions[0];
      const precio = opt ? opt.dataset.precio : '';
      document.getElementById('vt-precio-lista').value = precio || '';
      document.getElementById('vt-precio-final').value = precio || '';
    }
  });

  async function saveVenta() {
    const vid = document.getElementById('vt-vehiculo').value;
    const cid = document.getElementById('vt-cliente').value;
    const precioFinal = parseFloat(document.getElementById('vt-precio-final').value);
    if (!vid || !cid || !precioFinal) { showToast('Completá los campos obligatorios', 'error'); return; }

    const v = allVehiculos.find(x => x.id === vid);
    const lead = allLeads.find(x => x.id === cid);
    const venta = {
      id: Storage.generateId('vta'),
      vehiculo_id: vid,
      vehiculo_texto: `${v.marca} ${v.modelo} ${v.version} ${v.anio}`,
      cliente_id: cid,
      cliente_nombre: lead ? lead.nombre : cid,
      fecha_venta: document.getElementById('vt-fecha').value,
      precio_lista: v.precio,
      precio_final: precioFinal,
      forma_pago: document.getElementById('vt-pago').value,
      vendedor_id: session.id,
      vendedor_nombre: session.nombre,
      observaciones: document.getElementById('vt-obs').value.trim(),
    };

    await Storage.add('ventas', venta);
    await Storage.update('vehiculos', vid, { estado: 'vendido', fecha_venta: venta.fecha_venta });
    if (lead) {
      await Storage.update('leads', lead.id, { estado: 'vendido', ultima_actividad: new Date().toISOString() });
    }

    document.getElementById('venta-modal').classList.remove('active');
    [allVentas, allVehiculos] = await Promise.all([Storage.get('ventas'), Storage.get('vehiculos')]);
    renderVentas();
    updateStats();
    showToast('Venta registrada exitosamente', 'success');
  }

  async function deleteVenta(id) {
    confirmAction('¿Eliminar esta venta? El vehículo volverá a "disponible".', async () => {
      const venta = allVentas.find(v => v.id === id);
      await Storage.delete('ventas', id);
      if (venta) await Storage.update('vehiculos', venta.vehiculo_id, { estado: 'disponible', fecha_venta: null });
      [allVentas, allVehiculos] = await Promise.all([Storage.get('ventas'), Storage.get('vehiculos')]);
      renderVentas();
      updateStats();
      showToast('Venta eliminada', 'success');
    });
  }

  loadData();
</script>
</body>
</html>

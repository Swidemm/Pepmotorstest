<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes — PEP Motors Admin</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="admin-layout" id="admin-layout">
  <div id="sidebar-container"></div>
  <main class="admin-main">
    <div id="topbar-container"></div>
    <div class="admin-content">

      <div class="page-header-admin flex justify-between items-center mb-6">
        <div>
          <h1 class="page-title">Clientes</h1>
          <p class="page-subtitle" id="clientes-info">Cargando...</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openClienteModal()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nuevo cliente
          </button>
        </div>
      </div>

      <div style="display:flex; gap:10px; margin-bottom:16px">
        <div class="table-search" style="flex:1; max-width:320px">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search" placeholder="Buscar por nombre, DNI, email..." oninput="renderClientes()">
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Cliente</th>
              <th>DNI</th>
              <th>Teléfono</th>
              <th>Email</th>
              <th>Leads</th>
              <th>Compras</th>
              <th style="text-align:right">Acciones</th>
            </tr>
          </thead>
          <tbody id="clientes-tbody"></tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<!-- Cliente modal -->
<div class="modal-overlay" id="cliente-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="cliente-modal-title">Nuevo cliente</h2>
      <button class="modal-close" onclick="closeClienteModal()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="c-id">
      <div class="form-grid-2">
        <div class="form-group">
          <label>Nombre *</label>
          <input type="text" class="form-control" id="c-nombre" required>
        </div>
        <div class="form-group">
          <label>Apellido *</label>
          <input type="text" class="form-control" id="c-apellido" required>
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>DNI</label>
          <input type="text" class="form-control" id="c-dni">
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" class="form-control" id="c-telefono">
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" id="c-email">
      </div>
      <div class="form-group">
        <label>Dirección</label>
        <input type="text" class="form-control" id="c-direccion">
      </div>
      <div class="form-group">
        <label>Notas</label>
        <textarea class="form-control" id="c-notas" rows="3"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeClienteModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCliente()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast-container"></div>

<script src="../assets/js/storage.js"></script>
<script src="../assets/js/admin/auth.js"></script>
<script src="../assets/js/admin/sidebar.js"></script>
<script>
  const session = Auth.require();
  document.getElementById('sidebar-container').innerHTML = renderSidebar('clientes');
  document.getElementById('topbar-container').innerHTML = renderTopbar('Clientes', '');
  initSidebar();

  let allClientes = [];

  async function loadClientes() {
    allClientes = await Storage.get('clientes');
    document.getElementById('clientes-info').textContent = `${allClientes.length} clientes registrados`;
    renderClientes();
  }

  function renderClientes() {
    const search = document.getElementById('search').value.toLowerCase();
    const filtered = allClientes.filter(c => {
      const text = `${c.nombre} ${c.apellido} ${c.dni} ${c.email}`.toLowerCase();
      return !search || text.includes(search);
    });

    document.getElementById('clientes-tbody').innerHTML = filtered.length
      ? filtered.map(c => `<tr>
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:36px;height:36px;border-radius:50%;background:var(--color-primary);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:16px;font-weight:700;color:#fff;flex-shrink:0">${c.nombre.charAt(0)}</div>
              <div>
                <p style="font-weight:600;color:var(--color-white)">${c.nombre} ${c.apellido}</p>
                <p style="font-size:11px;color:var(--color-gray)">Desde ${c.fecha_creacion || '—'}</p>
              </div>
            </div>
          </td>
          <td style="font-size:12px">${c.dni || '—'}</td>
          <td style="font-size:12px">${c.telefono ? `<a href="tel:${c.telefono}" style="color:var(--color-primary)">${c.telefono}</a>` : '—'}</td>
          <td style="font-size:12px">${c.email || '—'}</td>
          <td><span style="background:rgba(59,130,246,0.15);color:var(--color-info);padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700">${(c.leads_ids||[]).length}</span></td>
          <td><span style="background:rgba(34,197,94,0.15);color:var(--color-success);padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700">${(c.ventas_ids||[]).length}</span></td>
          <td>
            <div class="td-actions" style="justify-content:flex-end">
              <button class="action-btn action-btn-edit" onclick="openClienteModal('${c.id}')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="action-btn action-btn-delete" onclick="deleteCliente('${c.id}')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
              </button>
            </div>
          </td>
        </tr>`).join('')
      : '<tr><td colspan="7" class="text-muted" style="padding:32px;text-align:center">No hay clientes</td></tr>';
  }

  function openClienteModal(id = null) {
    document.getElementById('c-id').value = id || '';
    document.getElementById('cliente-modal-title').textContent = id ? 'Editar cliente' : 'Nuevo cliente';
    if (id) {
      const c = allClientes.find(x => x.id === id);
      document.getElementById('c-nombre').value = c.nombre;
      document.getElementById('c-apellido').value = c.apellido;
      document.getElementById('c-dni').value = c.dni || '';
      document.getElementById('c-telefono').value = c.telefono || '';
      document.getElementById('c-email').value = c.email || '';
      document.getElementById('c-direccion').value = c.direccion || '';
      document.getElementById('c-notas').value = c.notas || '';
    } else {
      ['c-nombre','c-apellido','c-dni','c-telefono','c-email','c-direccion','c-notas'].forEach(f => document.getElementById(f).value = '');
    }
    document.getElementById('cliente-modal').classList.add('active');
  }

  function closeClienteModal() { document.getElementById('cliente-modal').classList.remove('active'); }

  async function saveCliente() {
    const nombre = document.getElementById('c-nombre').value.trim();
    const apellido = document.getElementById('c-apellido').value.trim();
    if (!nombre || !apellido) { showToast('Nombre y apellido son obligatorios', 'error'); return; }
    const data = {
      nombre, apellido,
      dni: document.getElementById('c-dni').value.trim(),
      telefono: document.getElementById('c-telefono').value.trim(),
      email: document.getElementById('c-email').value.trim(),
      direccion: document.getElementById('c-direccion').value.trim(),
      notas: document.getElementById('c-notas').value.trim(),
    };
    const id = document.getElementById('c-id').value;
    if (id) {
      await Storage.update('clientes', id, data);
      showToast('Cliente actualizado', 'success');
    } else {
      data.id = Storage.generateId('c');
      data.fecha_creacion = new Date().toISOString().slice(0, 10);
      data.leads_ids = [];
      data.ventas_ids = [];
      await Storage.add('clientes', data);
      showToast('Cliente creado', 'success');
    }
    closeClienteModal();
    allClientes = await Storage.get('clientes');
    renderClientes();
  }

  async function deleteCliente(id) {
    const c = allClientes.find(x => x.id === id);
    confirmAction(`¿Eliminar a "${c.nombre} ${c.apellido}"?`, async () => {
      await Storage.delete('clientes', id);
      allClientes = await Storage.get('clientes');
      renderClientes();
      showToast('Cliente eliminado', 'success');
    });
  }

  loadClientes();
</script>
</body>
</html>
